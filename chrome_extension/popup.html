<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emotion Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<main class="container">

  <header class="header">
    <img src="icons/headphones.png" alt="Emotion Player Logo" class="logo">
    <h1>Emotion Player</h1>
    <span id="statusBadge" class="status checking">Checking...</span>
    <button id="openDashboard" class="dashboard-btn">
      <img src="icons/dashboard.png" alt="Dashboard Icon">
    </button>
  </header>

<div class="moods">

  <button class="mood-btn" data-mood="happy">
    <img src="icons/happy.png">
    <span>Happy</span>
  </button>

  <button class="mood-btn" data-mood="sad">
    <img src="icons/sad.png">
    <span>Sad</span>
  </button>

  <button class="mood-btn" data-mood="angry">
    <img src="icons/angry.png">
    <span>Angry</span>
  </button>

  <button class="mood-btn" data-mood="neutral">
    <img src="icons/neutral.png">
    <span>Neutral</span>
  </button>

  <button class="mood-btn" data-mood="surprise">
    <img src="icons/surprise.png">
    <span>Surprise</span>
  </button>

</div>

  <section class="camera-section">
    <label>
      <input type="checkbox" id="cameraToggle"> Auto Detect Mood
    </label>

    <div id="cameraBox" class="camera-box hidden">
      <video id="video" autoplay></video>
      <div class="overlay">Detecting...</div>
    </div>
  </section>

  <section class="now-playing">
    <h3>Now Playing</h3>
    <div class="song-card">
      <div>
        <p id="songTitle"><strong>No song selected</strong></p>
        <span id="songArtist" style="opacity:0.7;">---</span>
      </div>

      <div class="controls">
        <button id="playBtn">
          <img src="icons/play-button.png" alt="Play Icon">
        </button>
        <button id="nextBtn">
          <img src="icons/play-next.png" alt="Next Icon">
        </button>
      </div>
    </div>
  </section>

  <section class="playlist">
    <h3>Playlist</h3>
    <div id="playlistContainer"></div>
  </section>

</main>

<script src="popup.js"></script>
</body>
</html>
